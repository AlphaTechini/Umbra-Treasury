<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Connect Wallet - Umbra Treasury</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-container": "#fc7c78",
                    "primary": "#4edea3",
                    "on-secondary-container": "#b4b5b5",
                    "tertiary-fixed-dim": "#ffb3af",
                    "on-tertiary-fixed-variant": "#842225",
                    "surface-variant": "#33343c",
                    "secondary-container": "#454747",
                    "secondary-fixed": "#e2e2e2",
                    "inverse-primary": "#006c49",
                    "on-secondary-fixed-variant": "#454747",
                    "on-secondary-fixed": "#1a1c1c",
                    "on-primary-fixed-variant": "#005236",
                    "background": "#12131a",
                    "outline": "#86948a",
                    "on-surface": "#e3e1ec",
                    "on-background": "#e3e1ec",
                    "inverse-on-surface": "#2f3038",
                    "surface-container-highest": "#33343c",
                    "tertiary": "#ffb3af",
                    "surface": "#12131a",
                    "on-tertiary-fixed": "#410005",
                    "on-tertiary-container": "#711419",
                    "surface-container-low": "#1a1b22",
                    "on-error-container": "#ffdad6",
                    "on-error": "#690005",
                    "primary-fixed-dim": "#4edea3",
                    "surface-container-high": "#292931",
                    "surface-container": "#1e1f26",
                    "primary-container": "#10b981",
                    "on-surface-variant": "#bbcabf",
                    "secondary": "#c6c6c7",
                    "on-secondary": "#2f3131",
                    "primary-fixed": "#6ffbbe",
                    "outline-variant": "#3c4a42",
                    "surface-container-lowest": "#0d0e15",
                    "on-primary-container": "#00422b",
                    "tertiary-fixed": "#ffdad7",
                    "surface-bright": "#383941",
                    "surface-tint": "#4edea3",
                    "on-tertiary": "#650911",
                    "surface-dim": "#12131a",
                    "error-container": "#93000a",
                    "secondary-fixed-dim": "#c6c6c7",
                    "on-primary-fixed": "#002113",
                    "inverse-surface": "#e3e1ec",
                    "error": "#ffb4ab",
                    "on-primary": "#003824"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "xs": "4px",
                    "unit": "4px",
                    "xl": "48px",
                    "sm": "8px",
                    "lg": "24px",
                    "container-max": "1280px",
                    "md": "16px",
                    "gutter": "24px"
            },
            "fontFamily": {
                    "body-lg": ["Inter"],
                    "label-mono": ["Space Grotesk"],
                    "h1": ["Inter"],
                    "h3": ["Inter"],
                    "data-point": ["Inter"],
                    "body-md": ["Inter"],
                    "h2": ["Inter"]
            },
            "fontSize": {
                    "body-lg": ["18px", {"lineHeight": "1.5", "letterSpacing": "-0.02em", "fontWeight": "400"}],
                    "label-mono": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "500"}],
                    "h1": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "600"}],
                    "h3": ["24px", {"lineHeight": "1.3", "letterSpacing": "-0.03em", "fontWeight": "500"}],
                    "data-point": ["14px", {"lineHeight": "1", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                    "body-md": ["14px", {"lineHeight": "1.5", "letterSpacing": "-0.01em", "fontWeight": "400"}],
                    "h2": ["30px", {"lineHeight": "1.2", "letterSpacing": "-0.03em", "fontWeight": "600"}]
            }
          }
        }
      }
    </script>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-md antialiased selection:bg-primary/20 selection:text-primary">
<main class="w-full max-w-[420px] flex flex-col items-center">
<!-- Brand / Logo Area -->
<div class="mb-lg flex flex-col items-center gap-sm">
<div class="w-12 h-12 rounded-lg bg-surface-container border border-surface-variant flex items-center justify-center text-primary shadow-[0_0_15px_rgba(78,222,163,0.1)]">
<span class="material-symbols-outlined text-[28px]" data-icon="account_balance" data-weight="fill" style="font-variation-settings: 'FILL' 1;">account_balance</span>
</div>
<span class="font-label-mono text-label-mono text-on-surface tracking-widest uppercase opacity-80">Umbra Treasury</span>
</div>
<!-- Connection Modal -->
<div class="w-full bg-surface-container-low border border-surface-variant rounded-xl p-lg flex flex-col relative overflow-hidden">
<!-- Subtle gradient glow at top -->
<div class="absolute top-0 left-0 right-0 h-[1px] bg-gradient-to-r from-transparent via-primary/30 to-transparent"></div>
<div class="mb-lg text-center">
<h1 class="font-h2 text-h2 text-on-surface mb-xs">Connect Wallet</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to manage your private treasury</p>
</div>
<div class="flex flex-col gap-sm">
<!-- Phantom -->
<button class="w-full flex items-center p-md border border-surface-variant rounded-lg bg-surface hover:bg-surface-container hover:border-outline transition-all duration-200 group focus:outline-none focus:ring-1 focus:ring-primary">
<div class="w-10 h-10 rounded-md bg-surface-container-highest border border-surface-variant flex items-center justify-center mr-md text-on-surface group-hover:text-primary group-hover:border-primary/50 transition-colors">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</div>
<span class="font-data-point text-data-point text-on-surface flex-grow text-left">Phantom</span>
<span class="material-symbols-outlined text-on-surface-variant opacity-0 -translate-x-2 group-hover:opacity-100 group-hover:translate-x-0 transition-all duration-200" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- Solflare -->
<button class="w-full flex items-center p-md border border-surface-variant rounded-lg bg-surface hover:bg-surface-container hover:border-outline transition-all duration-200 group focus:outline-none focus:ring-1 focus:ring-primary">
<div class="w-10 h-10 rounded-md bg-surface-container-highest border border-surface-variant flex items-center justify-center mr-md text-on-surface group-hover:text-primary group-hover:border-primary/50 transition-colors">
<span class="material-symbols-outlined" data-icon="flare">flare</span>
</div>
<span class="font-data-point text-data-point text-on-surface flex-grow text-left">Solflare</span>
<span class="material-symbols-outlined text-on-surface-variant opacity-0 -translate-x-2 group-hover:opacity-100 group-hover:translate-x-0 transition-all duration-200" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- Backpack -->
<button class="w-full flex items-center p-md border border-surface-variant rounded-lg bg-surface hover:bg-surface-container hover:border-outline transition-all duration-200 group focus:outline-none focus:ring-1 focus:ring-primary">
<div class="w-10 h-10 rounded-md bg-surface-container-highest border border-surface-variant flex items-center justify-center mr-md text-on-surface group-hover:text-primary group-hover:border-primary/50 transition-colors">
<span class="material-symbols-outlined" data-icon="backpack">backpack</span>
</div>
<span class="font-data-point text-data-point text-on-surface flex-grow text-left">Backpack</span>
<span class="material-symbols-outlined text-on-surface-variant opacity-0 -translate-x-2 group-hover:opacity-100 group-hover:translate-x-0 transition-all duration-200" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<!-- Modal Footer -->
<div class="mt-lg pt-md border-t border-surface-variant flex items-center justify-center gap-2 text-on-surface-variant opacity-70">
<span class="material-symbols-outlined text-[14px]" data-icon="lock">lock</span>
<p class="font-label-mono text-label-mono uppercase">Wallet is used as your identity</p>
</div>
</div>
</main>
</body></html>
