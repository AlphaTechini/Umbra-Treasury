<body class="bg-background min-h-screen flex flex-col font-body-md text-on-surface">
<!-- Top Navigation Suppressed: Transactional Intent -->
<!-- Side Navigation Suppressed: Transactional Intent -->
<!-- Main Canvas -->
<main class="flex-grow flex items-center justify-center p-gutter">
<div class="w-full max-w-[560px]">
<!-- Context & Identity -->
<div class="mb-lg text-center flex flex-col items-center">
<div class="h-12 w-12 rounded-full border border-surface-container-highest bg-surface-container flex items-center justify-center mb-md">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">description</span>
</div>
<h1 class="font-h2 text-h2 text-on-surface mb-sm">Request Transaction Disclosure</h1>
<p class="font-body-md text-body-md text-primary-container bg-primary-container/10 px-md py-sm border border-primary-container/20 rounded-DEFAULT inline-flex items-center gap-sm">
<span class="material-symbols-outlined text-[16px]">info</span>
                    DAO owner must approve request before access is granted.
                </p>
</div>
<!-- Form Card -->
<form class="bg-surface-container border border-surface-container-highest rounded-xl p-lg flex flex-col gap-lg">
<!-- Input: Name -->
<div class="flex flex-col gap-sm">
<label class="font-label-mono text-label-mono text-on-surface-variant" for="name">Name</label>
<input class="bg-background border border-surface-container-highest rounded-DEFAULT font-body-md text-body-md text-on-surface px-md py-[12px] focus:ring-0 focus:border-on-surface placeholder:text-on-secondary-fixed-variant transition-colors" id="name" name="name" placeholder="John Doe" type="text"/>
</div>
<!-- Input: Organization -->
<div class="flex flex-col gap-sm">
<label class="font-label-mono text-label-mono text-on-surface-variant" for="organization">Organization</label>
<input class="bg-background border border-surface-container-highest rounded-DEFAULT font-body-md text-body-md text-on-surface px-md py-[12px] focus:ring-0 focus:border-on-surface placeholder:text-on-secondary-fixed-variant transition-colors" id="organization" name="organization" placeholder="Acme Corp" type="text"/>
</div>
<!-- Input: Reason (Dropdown) -->
<div class="flex flex-col gap-sm">
<label class="font-label-mono text-label-mono text-on-surface-variant" for="reason">Reason</label>
<div class="relative">
<select class="appearance-none w-full bg-background border border-surface-container-highest rounded-DEFAULT font-body-md text-body-md text-on-surface px-md py-[12px] focus:ring-0 focus:border-on-surface transition-colors cursor-pointer" id="reason" name="reason">
<option disabled="" hidden="" selected="" value="">Select reason...</option>
<option value="audit">Audit</option>
<option value="tax">Tax</option>
<option value="review">Review</option>
<option value="other">Other</option>
</select>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">expand_more</span>
</div>
</div>
<!-- Input: Scope (Grouped Select) -->
<div class="flex flex-col gap-sm">
<label class="font-label-mono text-label-mono text-on-surface-variant mb-unit">Scope</label>
<div class="grid grid-cols-1 sm:grid-cols-3 gap-sm">
<label class="cursor-pointer relative">
<input class="peer sr-only" name="scope" type="radio" value="single"/>
<div class="bg-background border border-surface-container-highest rounded-DEFAULT px-md py-[10px] text-center peer-checked:border-on-surface peer-checked:bg-surface-bright transition-all font-body-md text-body-md text-on-surface-variant peer-checked:text-on-surface">
                                Single Tx
                            </div>
</label>
<label class="cursor-pointer relative">
<input checked="" class="peer sr-only" name="scope" type="radio" value="category"/>
<div class="bg-background border border-surface-container-highest rounded-DEFAULT px-md py-[10px] text-center peer-checked:border-on-surface peer-checked:bg-surface-bright transition-all font-body-md text-body-md text-on-surface-variant peer-checked:text-on-surface">
                                Category
                            </div>
</label>
<label class="cursor-pointer relative">
<input class="peer sr-only" name="scope" type="radio" value="daterange"/>
<div class="bg-background border border-surface-container-highest rounded-DEFAULT px-md py-[10px] text-center peer-checked:border-on-surface peer-checked:bg-surface-bright transition-all font-body-md text-body-md text-on-surface-variant peer-checked:text-on-surface">
                                Date Range
                            </div>
</label>
</div>
</div>
<!-- Input: Message (Textarea) -->
<div class="flex flex-col gap-sm">
<label class="font-label-mono text-label-mono text-on-surface-variant" for="message">Message</label>
<textarea class="bg-background border border-surface-container-highest rounded-DEFAULT font-body-md text-body-md text-on-surface px-md py-[12px] focus:ring-0 focus:border-on-surface placeholder:text-on-secondary-fixed-variant transition-colors resize-none" id="message" name="message" placeholder="Briefly explain the purpose of your request..." rows="4"></textarea>
</div>
<!-- Divider -->
<hr class="border-surface-container-highest my-unit"/>
<!-- Actions -->
<div class="flex items-center gap-md pt-unit">
<button class="px-md py-[12px] border border-surface-container-highest rounded-DEFAULT font-data-point text-data-point text-on-surface hover:bg-surface-container-highest transition-colors w-1/3" type="button">
                        Cancel
                    </button>
<button class="px-md py-[12px] bg-primary-container rounded-DEFAULT font-data-point text-data-point text-on-primary-fixed hover:brightness-110 transition-all w-2/3 flex justify-center items-center gap-sm" type="submit">
<span>Submit Request</span>
<span class="material-symbols-outlined text-[18px]">send</span>
</button>
</div>
</form>
<div class="mt-lg text-center font-label-mono text-label-mono text-on-surface-variant">
                Secure. Transparent. Immutable.
            </div>
</div>
