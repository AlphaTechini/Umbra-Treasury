version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - DATABASE_URL=${DATABASE_URL}
      - UMBRA_PROVIDER=${UMBRA_PROVIDER:-mock}
      - SOLANA_RPC_URL=${SOLANA_RPC_URL}
      - SOLANA_NETWORK=${SOLANA_NETWORK:-devnet}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - PUBLIC_API_URL=${PUBLIC_API_URL:-http://localhost:8080}
        - PUBLIC_SOLANA_RPC_URL=${PUBLIC_SOLANA_RPC_URL}
        - PUBLIC_SOLANA_NETWORK=${PUBLIC_SOLANA_NETWORK:-devnet}
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
